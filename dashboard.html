<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - RudhraNetra</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Main Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFF1E0; /* Keeping brand colors */
            color: #4A2B18;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }

        /* Sidebar Styling */
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 24px;
            border-radius: 16px;
            color: #8B4513;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 8px;
            position: relative;
            overflow: hidden;
        }

        .sidebar-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #8B4513;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .sidebar-item:hover::before {
            opacity: 0.05;
        }

        .sidebar-item.active {
            color: #FFF1E0;
            box-shadow: 0 10px 25px rgba(139, 69, 19, 0.2);
            transform: translateY(-2px);
        }

        .sidebar-item.active::before {
            opacity: 1;
        }

        .sidebar-item > * {
            position: relative;
            z-index: 1;
        }

        .tab-content {
            display: none;
            animation: slide-up 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .tab-content.active {
            display: block;
        }

        @keyframes slide-up {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Forms & Inputs */
        .dashboard-input {
            width: 100%;
            padding: 16px;
            background: #FAEDDF;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: #4A2B18;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            margin-top: 6px;
        }
        
        .dashboard-input:focus {
            background: #FFF;
            border-color: #8B4513;
            box-shadow: 0 0 0 4px rgba(139, 69, 19, 0.1);
        }

        .dashboard-input:disabled {
            background: rgba(250, 237, 223, 0.5);
            cursor: not-allowed;
            color: #888;
            border-color: rgba(139, 69, 19, 0.05);
        }

        .btn-action {
            background: #5A2E14;
            color: #FFF1E0;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(90, 46, 20, 0.2);
            cursor: pointer;
            border: none;
        }
        
        .btn-action:hover {
            background: #4A2410;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(90, 46, 20, 0.3);
        }

        .btn-secondary {
            border: 2px solid #8B4513;
            color: #8B4513;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            background: transparent;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: #8B4513;
            color: #FFF1E0;
            transform: translateY(-1px);
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #F4EAE0;
            padding: 0;
            background: white;
            box-shadow: 0 10px 25px rgba(139, 69, 19, 0.15);
            transition: transform 0.3s ease;
        }

        .avatar-circle:hover {
            transform: scale(1.05);
        }

        /* Order Tracking */
        .tracking-step {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            padding-bottom: 24px;
        }

        .tracking-step:last-child {
            padding-bottom: 0;
        }

        .tracking-step::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 24px;
            bottom: 0;
            width: 2px;
            background: rgba(139, 69, 19, 0.2);
        }

        .tracking-step:last-child::before {
            display: none;
        }

        .step-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            border: 2px solid rgba(139, 69, 19, 0.3);
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .step-dot.completed {
            background: #8B4513;
            border-color: #8B4513;
        }
    </style>
</head>
<body class="bg-[#FFF1E0]">

    <!-- Simple Navbar for Dashboard -->
    <nav class="bg-white shadow-sm border-b border-[#8B4513]/10 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <a href="index.html" class="flex items-center gap-3">
            <img src="image/logo_icon.png" alt="Icon" class="h-8">
            <img src="image/logo_text.png" alt="Text" class="h-8 hidden md:block">
        </a>
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-[#8B4513] font-medium hover:underline text-sm">Back to Store</a>
            <button onclick="Auth.logout()" class="text-sm font-semibold text-red-600 hover:text-red-800 transition">Logout</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8 md:py-12 flex flex-col md:flex-row gap-8">
        
        <!-- Sidebar -->
        <aside class="md:w-1/4 bg-[#F4EAE0] rounded-[32px] p-6 shadow-[0px_20px_40px_rgba(139,69,19,0.08)] h-max border border-[#8B4513]/10 relative z-10">
            <div class="text-center mb-10 border-b border-[#8B4513]/10 pb-8 mt-4">
                <div class="relative inline-block mb-6">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=8B4513&color=fff" class="avatar-circle mx-auto">
                    <div class="absolute inset-0 rounded-full shadow-inner pointer-events-none"></div>
                </div>
                <h3 id="userNameDisplay" class="text-2xl font-bold text-[#8B4513] mb-1 font-serif">User Name</h3>
                <p id="userEmailDisplay" class="text-sm font-medium text-[#8B4513]/60">user@example.com</p>
            </div>

            <nav>
                <div class="sidebar-item active" onclick="switchTab('profile', this)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    My Profile
                </div>
                <div class="sidebar-item" onclick="switchTab('orders', this)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    My Orders
                </div>
                <div class="sidebar-item" onclick="switchTab('addresses', this)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Saved Addresses
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="w-full md:w-3/4 bg-white rounded-3xl md:rounded-[32px] p-6 md:p-12 shadow-[0px_20px_40px_rgba(139,69,19,0.04)] border border-[#8B4513]/5 min-h-[600px] relative z-10 overflow-hidden">
            
            <!-- PROFILE TAB -->
            <section id="profile-tab" class="tab-content active">
                <h2 class="text-4xl text-[#8B4513] mb-10 font-serif">My Profile</h2>
                
                <div class="bg-[#FAEDDF] rounded-2xl p-6 md:p-8 mb-10 border border-[#8B4513]/10 flex flex-col md:flex-row items-start md:items-center justify-between gap-6 overflow-hidden">
                    <div class="w-full overflow-hidden">
                        <h4 class="font-bold text-lg mb-2 text-[#8B4513]">Update Avatar</h4>
                        <p class="text-sm text-[#8B4513]/60 mb-4">Choose a new profile picture to personalize your account.</p>
                        <input type="file" id="avatarUpload" accept="image/*" class="w-full text-xs md:text-sm file:mr-2 file:md:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:md:text-sm file:font-bold file:bg-[#8B4513]/10 file:text-[#8B4513] hover:file:bg-[#8B4513]/20 cursor-pointer text-[#8B4513]/70 overflow-hidden text-ellipsis">
                    </div>
                    <button onclick="updateAvatar()" class="w-full md:w-auto btn-secondary whitespace-nowrap mt-2 md:mt-0 justify-center">Upload Image</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-sm font-semibold text-[#8B4513]">Full Name <span class="text-xs font-normal text-gray-500">(Non-editable)</span></label>
                        <input type="text" id="prof-name" class="dashboard-input" disabled>
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-[#8B4513]">Mobile Number <span class="text-xs font-normal text-gray-500">(Non-editable)</span></label>
                        <input type="text" id="prof-mobile" class="dashboard-input" disabled>
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-sm font-semibold text-[#8B4513]">Email Address</label>
                        <input type="email" id="prof-email" class="dashboard-input" disabled>
                        <p class="text-xs text-gray-400 mt-1">Email cannot be changed currently.</p>
                    </div>
                </div>
            </section>

            <!-- ORDERS TAB -->
            <section id="orders-tab" class="tab-content hidden">
                <h2 class="text-4xl text-[#8B4513] mb-10 font-serif">My Orders</h2>

                <div id="orders-container" class="space-y-6">
                    <!-- Orders will be loaded here dynamically -->
                    <div class="text-center text-[#8B4513]/60 py-16 font-medium text-lg">Loading orders...</div>
                </div>
            </section>

            <!-- ADDRESSES TAB -->
            <section id="addresses-tab" class="tab-content hidden">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
                    <h2 class="text-3xl md:text-4xl text-[#8B4513] font-serif">Saved Addresses</h2>
                    <button onclick="document.getElementById('address-modal').classList.remove('hidden')" class="w-full md:w-auto px-6 py-3 bg-[#8B4513] text-[#FFF1E0] rounded-full hover:bg-[#5c3a23] transition font-bold shadow-lg flex justify-center items-center gap-2 text-sm md:text-base">Add New Address</button>
                </div>
                
                <div id="addressesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Addresses will be loaded here dynamically -->
                </div>
            </section>

        </main>
    </div>

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-gradient-to-br from-[#8B4513]/5 to-transparent blur-[100px]"></div>
        <div class="absolute top-[60%] -right-[10%] w-[40%] h-[40%] rounded-full bg-gradient-to-tl from-[#8B4513]/5 to-transparent blur-[100px]"></div>
    </div>

    <!-- Address Modal (Hidden by default) -->
    <div id="addressModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] hidden flex items-center justify-center transition-opacity">
        <div class="bg-[#F4EAE0] rounded-[24px] shadow-2xl p-8 max-w-lg w-full m-4 max-h-[90vh] overflow-y-auto transform scale-95 transition-transform border border-[#8B4513]/20" id="addressModalContent">
            <h3 class="text-2xl font-bold text-[#8B4513] mb-8 font-serif">Add New Address</h3>
            <form id="addressForm">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="text-xs font-semibold">Address Label (e.g. Home, Office)</label>
                        <input type="text" id="addr-name" class="dashboard-input" required>
                    </div>
                    <div>
                        <label class="text-xs font-semibold">Receiver Name</label>
                        <input type="text" id="addr-receiver" class="dashboard-input" required>
                    </div>
                    <div>
                        <label class="text-xs font-semibold">Phone Number</label>
                        <input type="tel" id="addr-phone" class="dashboard-input" required pattern="[0-9]{10}">
                    </div>
                    <div class="col-span-2">
                        <label class="text-xs font-semibold">House/Flat No & Street</label>
                        <input type="text" id="addr-street" class="dashboard-input" required>
                    </div>
                    <div>
                        <label class="text-xs font-semibold">City</label>
                        <input type="text" id="addr-city" class="dashboard-input" required>
                    </div>
                    <div>
                        <label class="text-xs font-semibold">State</label>
                        <input type="text" id="addr-state" class="dashboard-input" required>
                    </div>
                    <div>
                        <label class="text-xs font-semibold">Pincode</label>
                        <input type="text" id="addr-pincode" class="dashboard-input" required>
                    </div>
                </div>
                <div class="flex gap-4 mt-8">
                    <button type="submit" class="btn-action w-full">Save Address</button>
                    <button type="button" onclick="closeAddressModal()" class="btn-secondary w-full">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="auth.js"></script>
    <script>
        // Check Auth
        if (!Auth.requireAuth()) {
            // Handled by requireAuth
        } else {
            loadUserData();
        }

        // Tab Switching Logic
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.add('active');
            
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            if(tabId === 'orders') loadOrders();
            if(tabId === 'addresses') loadAddresses();
        }

        // Load User Data
        function loadUserData() {
            const user = Auth.getUser();
            if (!user) return;

            document.getElementById('prof-name').value = user.name;
            document.getElementById('prof-email').value = user.email;
            document.getElementById('prof-mobile').value = user.mobile;

            document.getElementById('userNameDisplay').innerText = user.name;
            document.getElementById('userEmailDisplay').innerText = user.email;

            if (user.avatar) {
                document.getElementById('userAvatar').src = user.avatar;
            } else {
                document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=8B4513&color=fff`;
            }
        }

        // Update Avatar
        async function updateAvatar() {
            const fileInput = document.getElementById('avatarUpload');
            if (!fileInput.files[0]) return alert("Please select an image first.");

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result;
                const user = Auth.getUser();
                await DB.update('Users', user.id, { avatar: base64 });
                user.avatar = base64;
                Auth.loginState(user); // refresh localstorage cache
                loadUserData();
                alert("Avatar updated successfully!");
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        // --- Addresses Logic ---
        function openAddressModal() { 
            const modal = document.getElementById('addressModal');
            const content = document.getElementById('addressModalContent');
            modal.classList.remove('hidden');
            setTimeout(() => { content.classList.remove('scale-95'); content.classList.add('scale-100'); }, 10);
        }
        function closeAddressModal() { 
            const modal = document.getElementById('addressModal');
            const content = document.getElementById('addressModalContent');
            content.classList.remove('scale-100'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); document.getElementById('addressForm').reset(); }, 300);
        }

        document.getElementById('addressForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = Auth.getUser();
            const newAddress = {
                id: 'addr_' + Date.now(),
                addressName: document.getElementById('addr-name').value,
                receiverName: document.getElementById('addr-receiver').value,
                receiverPhone: document.getElementById('addr-phone').value,
                fullAddress: document.getElementById('addr-street').value,
                city: document.getElementById('addr-city').value,
                state: document.getElementById('addr-state').value,
                pincode: document.getElementById('addr-pincode').value
            };

            let addresses = user.addresses || [];
            addresses.push(newAddress);
            
            await DB.update('Users', user.id, { addresses });
            user.addresses = addresses;
            Auth.loginState(user); // update local cache

            closeAddressModal();
            loadAddresses();
        });

        async function loadAddresses() {
            let user = Auth.getUser();
            
            // 1. Fetch fresh user data from DB to ensure sync across refreshes
            try {
                const freshUser = await DB.findOne('Users', { email: user.email });
                if (freshUser) {
                    user = freshUser;
                    Auth.loginState(user);
                }
            } catch(e) { console.error("Could not fetch fresh user", e); }

            // 2. Migrate any old addresses from the deprecated 'Addresses' collection
            try {
                const oldAddresses = await DB.find('Addresses', { userId: user.id });
                if (oldAddresses && oldAddresses.length > 0) {
                    user.addresses = [...(user.addresses || []), ...oldAddresses];
                    await DB.update('Users', user.id, { addresses: user.addresses });
                    Auth.loginState(user);
                    // Cleanup old addresses
                    for (const old of oldAddresses) {
                        await DB.delete('Addresses', old.id);
                    }
                }
            } catch(e) { console.error("Migration check failed", e); }

            const addresses = user.addresses || [];
            const container = document.getElementById('addressesContainer');
            
            if(addresses.length === 0) {
                container.innerHTML = `<div class="col-span-2 text-center py-16 bg-[#FAEDDF] rounded-2xl"><p class="text-[#8B4513]/60 font-medium text-lg">No saved addresses found.</p></div>`;
                return;
            }

            container.innerHTML = addresses.map(addr => `
                <div class="border-2 border-[#8B4513]/10 rounded-2xl p-6 relative hover:shadow-[0_8px_20px_rgba(139,69,19,0.06)] hover:border-[#8B4513]/30 transition-all duration-300 bg-white group">
                    <span class="absolute top-5 right-5 bg-[#FAEDDF] text-[#8B4513] text-[11px] font-bold px-3 py-1.5 rounded-full uppercase tracking-wider">${addr.addressName}</span>
                    <h4 class="font-bold text-[#8B4513] text-xl mb-2">${addr.receiverName}</h4>
                    <p class="text-[15px] font-medium text-[#8B4513]/80 mb-2 flex items-center gap-2">
                        <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        ${addr.receiverPhone}
                    </p>
                    <p class="text-[15px] text-[#8B4513]/70 mb-6 line-clamp-2 pr-12 leading-relaxed">${addr.fullAddress}, ${addr.city}, ${addr.state} - ${addr.pincode}</p>
                    <button onclick="deleteAddress('${addr.id}')" class="text-sm text-red-500 font-bold hover:text-red-700 transition opacity-0 group-hover:opacity-100 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        Remove
                    </button>
                </div>
            `).join('');
        }

        async function deleteAddress(id) {
            if(confirm("Are you sure you want to delete this address?")) {
                const user = Auth.getUser();
                if(user.addresses) {
                    user.addresses = user.addresses.filter(a => a.id !== id);
                    await DB.update('Users', user.id, { addresses: user.addresses });
                    Auth.loginState(user);
                    loadAddresses();
                }
            }
        }

        // --- Orders Logic ---
        async function loadOrders() {
            let user = Auth.getUser();
            
            // 1. Fetch fresh user data from DB to ensure sync
            try {
                const freshUser = await DB.findOne('Users', { email: user.email });
                if (freshUser) {
                    user = freshUser;
                    Auth.loginState(user);
                }
            } catch(e) { console.error("Could not fetch fresh user", e); }

            // 2. Migrate old orders if any exist in the global Orders collection
            try {
                const oldOrders = await DB.find('Orders', { userId: user.id });
                if (oldOrders && oldOrders.length > 0) {
                    user.orders = [...(user.orders || []), ...oldOrders];
                    
                    // Deduplicate
                    const uniqueOrders = [];
                    const seen = new Set();
                    for(const o of user.orders) {
                        if(!seen.has(o.orderNumber || o.id)) {
                            seen.add(o.orderNumber || o.id);
                            uniqueOrders.push(o);
                        }
                    }
                    user.orders = uniqueOrders;
                    
                    await DB.update('Users', user.id, { orders: user.orders });
                    Auth.loginState(user);
                    
                    // Cleanup old ones
                    for (const old of oldOrders) {
                        await DB.delete('Orders', old.id);
                    }
                }
            } catch(e) { console.error("Migration check failed", e); }

            const orders = user.orders || [];
            const container = document.getElementById('orders-container'); // fixed ID!

            if(orders.length === 0) {
                container.innerHTML = `<div class="text-center py-16 bg-[#FAEDDF] rounded-2xl"><p class="text-[#8B4513]/60 font-medium text-lg">You haven't placed any orders yet.</p><a href="index.html" class="inline-block mt-4 text-[#8B4513] font-bold hover:text-[#5C2E0C] underline decoration-2 underline-offset-4 transition">Start your spiritual journey</a></div>`;
                return;
            }

            // sort by newest first
            orders.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

            container.innerHTML = orders.map(order => `
                <div class="border-2 border-[#8B4513]/10 rounded-2xl p-8 bg-white shadow-[0_4px_15px_rgba(139,69,19,0.02)] hover:shadow-[0_10px_30px_rgba(139,69,19,0.06)] transition-all duration-300">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 pb-6 border-b border-[#8B4513]/10 gap-4">
                        <div>
                            <p class="text-xs text-[#8B4513]/60 uppercase tracking-widest font-bold mb-2">Order #${order.orderNumber || order.id.toUpperCase()}</p>
                            <p class="text-sm font-semibold text-[#8B4513]">Placed on ${new Date(order.createdAt).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                        </div>
                        <div class="md:text-right bg-[#FAEDDF] px-6 py-3 rounded-xl border border-[#8B4513]/10">
                            <p class="text-xs text-[#8B4513]/80 font-semibold uppercase tracking-wider mb-1">Total Amount</p>
                            <p class="text-2xl font-bold text-[#8B4513]">₹${order.totalAmount || 0}</p>
                        </div>
                    </div>
                    
                    <div class="mt-2 mb-6">
                        <h4 class="text-sm font-semibold mb-3 text-[#8B4513]">Items Ordered</h4>
                        <div class="space-y-3 bg-[#FAEDDF]/30 p-4 rounded-xl border border-[#8B4513]/5">
                            ${(order.items && order.items.length > 0) ? order.items.map(item => `
                                <div class="flex justify-between items-center text-sm">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 bg-white rounded-lg border border-[#8B4513]/10 overflow-hidden flex items-center justify-center shrink-0">
                                            ${item.image ? `<img src="${item.image}" class="object-cover w-full h-full" alt="product">` : `<img src="image/logo_icon.png" class="w-6 h-6 opacity-50" alt="product">`}
                                        </div>
                                        <div>
                                            <p class="font-bold text-[#8B4513] line-clamp-1">${item.name || item.title || 'Spiritual Item'}</p>
                                            <p class="text-xs text-[#8B4513]/70">Qty: ${item.quantity || 1}</p>
                                        </div>
                                    </div>
                                    <p class="font-bold text-[#8B4513] shrink-0">&#8377;${parseInt(item.price?.toString().replace(/[^0-9]/g, '') || 0).toLocaleString('en-IN')}</p>
                                </div>
                            `).join('') : '<p class="text-xs text-[#8B4513]/60 italic">Old order (items not recorded)</p>'}
                        </div>
                    </div>

                    <div class="mt-4">
                        <h4 class="text-sm font-semibold mb-4 text-[#8B4513]">Order Tracking</h4>
                        <div class="pl-2">
                            <!-- Tracking UI -->
                            <div class="tracking-step">
                                <div class="step-dot completed"><svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                                <div><p class="text-sm font-bold">Order Placed</p></div>
                            </div>
                            <div class="tracking-step">
                                <div class="step-dot ${order.status === 'Confirmed' || order.status === 'Shipped' || order.status === 'Delivered' ? 'completed' : ''}">${order.status === 'Confirmed' || order.status === 'Shipped' || order.status === 'Delivered' ? '<svg class="w-3 h-3 text-white animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}</div>
                                <div><p class="text-sm font-bold ${order.status === 'Confirmed' || order.status === 'Shipped' || order.status === 'Delivered' ? '' : 'text-gray-400'}">Confirmed</p></div>
                            </div>
                            <div class="tracking-step">
                                <div class="step-dot ${order.status === 'Shipped' || order.status === 'Delivered' ? 'completed' : ''}">${order.status === 'Shipped' || order.status === 'Delivered' ? '<svg class="w-3 h-3 text-white animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}</div>
                                <div><p class="text-sm font-bold ${order.status === 'Shipped' || order.status === 'Delivered' ? '' : 'text-gray-400'}">Shipped</p></div>
                            </div>
                            <div class="tracking-step">
                                <div class="step-dot ${order.status === 'Delivered' ? 'completed' : ''}">${order.status === 'Delivered' ? '<svg class="w-3 h-3 text-white animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}</div>
                                <div><p class="text-sm font-bold ${order.status === 'Delivered' ? '' : 'text-gray-400'}">Delivered</p></div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Initialize default tab loads if needed
        window.addEventListener('DOMContentLoaded', () => {
            if(Auth.isLoggedIn()) {
                // Preload addresses so it's snappy
                loadAddresses();
            }
        });

    </script>
</body>
</html>
