<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Karungali Bead Experience</title>
  <meta name="description" content="Explore the hand-crafted Karungali ebony wood bead in a premium 3D scrolling experience.">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Loading Spinner -->
  <div id="loader" class="loader-container">
    <div class="spinner"></div>
  </div>

  <!-- 3D Canvas Background -->
  <canvas class="webgl"></canvas>

  <!-- Content Overlay -->
  <div class="login-layout">
    <!-- Tap hint centered on screen -->
    <div class="tap-hint">Tap to continue</div>

    <!-- The left side is empty, letting the 3D bead shine -->
    <div class="left-pane">
      <div class="bead-features">
        <div class="feature-item feature-top">
          <span class="feature-number">100%</span>
          <span class="feature-text">Authentic Karungali</span>
        </div>
        <div class="feature-item feature-left">
          <span class="feature-number">Vedic</span>
          <span class="feature-text">Consecration</span>
        </div>
        <div class="feature-item feature-bottom">
          <span class="feature-number">Handcrafted</span>
          <span class="feature-text">Finish</span>
        </div>
      </div>
    </div>
    
    <!-- The right side holds the login form -->
    <div class="right-pane">
      <div class="login-glass-panel">
        <div class="login-header">
          <h2>Welcome Back</h2>
          <p id="login-subtitle">Sign in to your Karungali account.</p>
        </div>
        
        <div class="login-tabs">
          <button type="button" class="tab-btn active" id="tab-user" onclick="switchTab('user')">User Login</button>
          <button type="button" class="tab-btn" id="tab-admin" onclick="switchTab('admin')">Admin Login</button>
          <div class="tab-indicator"></div>
        </div>
        <form class="login-form" id="main-login-form" action="#">
          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
          </div>
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox"> Remember me
            </label>
            <a href="#" class="forgot-password" onclick="showForgotPassword(event)">Forgot Password?</a>
          </div>
          <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <p class="signup-link" id="signup-link-container">Don't have an account? <a href="#" onclick="showSignUpForm(event)">Sign up</a></p>

        <!-- Forgot Password Form (Hidden by default) -->
        <form class="login-form" id="forgot-password-form" action="#" style="display: none;">
          <div class="input-group">
            <label for="reset-email">Email</label>
            <input type="email" id="reset-email" placeholder="Enter your email address" required>
          </div>
          <button type="submit" class="btn-primary">Send Reset Link</button>
          <p class="signup-link"><a href="#" onclick="showLoginForm(event)">Back to Login</a></p>
        </form>

        <!-- Sign Up Form (Hidden by default) -->
        <form class="login-form" id="signup-form" action="#" style="display: none;">
          <div class="input-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" placeholder="Enter your name" required>
          </div>
          <div class="input-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" placeholder="Enter your email address" required>
          </div>
          <div class="input-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="Create a password" required>
          </div>
          <button type="submit" class="btn-primary">Create Account</button>
          <p class="signup-link">Already have an account? <a href="#" onclick="showLoginForm(event)">Sign In</a></p>
        </form>
      </div>
    </div>
  </div>

  <!-- Three.js and GSAP Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- GLTFLoader for future .glb support -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  
  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
  <script>
    function switchTab(role) {
      // Update Active Tab Styles
      document.getElementById('tab-user').classList.remove('active');
      document.getElementById('tab-admin').classList.remove('active');
      document.getElementById('tab-' + role).classList.add('active');

      // Update Subtitle & Button Text
      const subtitle = document.getElementById('login-subtitle');
      const submitBtn = document.querySelector('.btn-primary');
      const indicator = document.querySelector('.tab-indicator');

      if (role === 'admin') {
        subtitle.innerText = 'Sign in to the admin dashboard.';
        submitBtn.innerText = 'Admin Sign In';
        indicator.style.transform = 'translateX(100%)';
        document.getElementById('signup-link-container').style.display = 'none'; // Hide sign up for admins
      } else {
        subtitle.innerText = 'Sign in to your Karungali account.';
        submitBtn.innerText = 'Sign In';
        indicator.style.transform = 'translateX(0)';
        document.getElementById('signup-link-container').style.display = 'block'; // Show sign up for users
      }

      // Add a slick fade-in-up animation to the form inputs when switching
      gsap.fromTo('.login-form', 
        { opacity: 0, y: 15 }, 
        { opacity: 1, y: 0, duration: 0.5, ease: "back.out(1.2)" }
      );
    }

    // Show Forgot Password Form
    function showForgotPassword(e) {
      if(e) e.preventDefault();
      
      // Hide Login Elements
      document.querySelector('.login-tabs').style.display = 'none';
      document.querySelector('.login-form').style.display = 'none';
      document.getElementById('signup-link-container').style.display = 'none';
      
      // Update Header
      document.querySelector('.login-header h2').innerText = 'Reset Password';
      document.getElementById('login-subtitle').innerText = 'Enter your email to receive a secure reset link.';
      
      // Show Reset Form with animation
      const resetForm = document.getElementById('forgot-password-form');
      resetForm.style.display = 'flex';
      gsap.fromTo(resetForm, 
        { opacity: 0, y: 15 }, 
        { opacity: 1, y: 0, duration: 0.5, ease: "back.out(1.2)" }
      );
    }

    // Show Login Form
    function showLoginForm(e) {
      if(e) e.preventDefault();
      
      // Hide Reset and Sign Up Forms
      document.getElementById('forgot-password-form').style.display = 'none';
      document.getElementById('signup-form').style.display = 'none';
      
      // Update Header
      document.querySelector('.login-header h2').innerText = 'Welcome Back';
      
      // Restore appropriate subtitle based on active tab
      const isAdmin = document.getElementById('tab-admin').classList.contains('active');
      document.getElementById('login-subtitle').innerText = isAdmin ? 'Sign in to the admin dashboard.' : 'Sign in to your Karungali account.';
      
      // Show Login Elements
      document.querySelector('.login-tabs').style.display = 'flex';
      document.querySelector('.login-form').style.display = 'flex';
      document.getElementById('signup-link-container').style.display = 'block';
      
      // Animate them back in
      gsap.fromTo('.login-form', 
        { opacity: 0, y: -15 }, 
        { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }
      );
    }

    // Toast Notification System
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerHTML = message;
      toast.classList.add('show');
      
      // Auto-hide after 4 seconds
      setTimeout(() => {
        toast.classList.remove('show');
      }, 4000);
    }
    // Show Sign Up Form
    function showSignUpForm(e) {
      if(e) e.preventDefault();
      
      // Hide Login Elements
      document.querySelector('.login-tabs').style.display = 'none';
      document.querySelector('.login-form').style.display = 'none';
      document.getElementById('signup-link-container').style.display = 'none';
      
      // Update Header
      document.querySelector('.login-header h2').innerText = 'Create Account';
      document.getElementById('login-subtitle').innerText = 'Join us and get authentic Karungali products.';
      
      // Show Sign Up Form with animation
      const signupForm = document.getElementById('signup-form');
      signupForm.style.display = 'flex';
      gsap.fromTo(signupForm, 
        { opacity: 0, y: 15 }, 
        { opacity: 1, y: 0, duration: 0.5, ease: "back.out(1.2)" }
      );
    }

    </script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyC8NPDb0efimxJE_WHA3-rbmFdynla6TwI",
      authDomain: "studio-6539281913-cab55.firebaseapp.com",
      projectId: "studio-6539281913-cab55",
      storageBucket: "studio-6539281913-cab55.firebasestorage.app",
      messagingSenderId: "654131616933",
      appId: "1:654131616933:web:1411cc691a6fe9a700c14c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const mainLoginForm = document.getElementById('main-login-form');
  if (mainLoginForm) {
    mainLoginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const isAdminTab = document.getElementById('tab-admin').classList.contains('active');

      const submitBtn = mainLoginForm.querySelector('.btn-primary');
      const originalText = submitBtn.innerText;
      submitBtn.innerText = 'Signing in...';
      submitBtn.disabled = true;

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          if (isAdminTab) {
            if (email.toLowerCase() === 'rudranethra@admin.com') {
                sessionStorage.setItem('adminEmail', email);
                sessionStorage.setItem('adminPwd', password); 
                window.location.href = 'admin.html';
            } else {
                showToast("Access Denied: You are not an admin.");
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
                auth.signOut();
            }
          } else {
            window.location.href = 'home.html';
          }
        })
        .catch((error) => {
          let errorMsg = "An error occurred. Please try again.";
          if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
             errorMsg = "Invalid email or password. Please try again or sign up.";
          } else {
             errorMsg = error.message;
          }
          showToast(errorMsg);
          submitBtn.innerText = originalText;
          submitBtn.disabled = false;
        });
    });
  }

  const signupForm = document.getElementById('signup-form');
  if (signupForm) {
    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;

      const submitBtn = signupForm.querySelector('.btn-primary');
      const originalText = submitBtn.innerText;
      submitBtn.innerText = 'Creating account...';
      submitBtn.disabled = true;

      createUserWithEmailAndPassword(auth, email, password)
        .then(async (userCredential) => {
          try {
            await setDoc(doc(db, "users", userCredential.user.uid), {
                name: name,
                email: email,
                createdAt: new Date().toISOString()
            });
          } catch (e) {
            console.warn("Could not save to Firestore (check your database rules). User auth created successfully.", e);
          }
          showToast('Account created! Redirecting...');
          setTimeout(() => {
              window.location.href = 'home.html';
          }, 1500);
        })
        .catch((error) => {
          showToast("Error: " + error.message);
          submitBtn.innerText = originalText;
          submitBtn.disabled = false;
        });
    });
  }

  const forgotForm = document.getElementById('forgot-password-form');
  if (forgotForm) {
    forgotForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('reset-email').value.trim();
      if (!email) {
          showToast("Please enter a valid email.");
          return;
      }
      const submitBtn = forgotForm.querySelector('.btn-primary');
      const originalText = submitBtn.innerText;
      submitBtn.innerText = 'Sending...';
      submitBtn.disabled = true;

      sendPasswordResetEmail(auth, email)
        .then(() => {
          showToast("A secure reset link has been sent to your email!");
          document.getElementById('reset-email').value = '';
          setTimeout(() => {
            showLoginForm();
            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
          }, 3000);
        })
        .catch((error) => {
          showToast("Error: " + error.message);
          submitBtn.innerText = originalText;
          submitBtn.disabled = false;
        });
    });
  }
  </script>
</body>
</html>
