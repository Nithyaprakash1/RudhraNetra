<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Checkout | Rudra Nethra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        html, body {
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFF1E0;
            color: #8B4513;
        }
        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }
        .glass-nav {
            background: rgba(255, 242, 226, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(142, 89, 54, 0.2);
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            border-radius: 9999px;
        }
        .sharp-edge { border-radius: 0 !important; }
        
        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(139, 69, 19, 0.2);
            border-radius: 0.5rem;
            color: #8B4513;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #8B4513;
            background: #fff;
            box-shadow: 0 0 0 2px rgba(139, 69, 19, 0.1);
        }
        .input-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #8B4513;
        }

        /* Dynamic Navbar Colors */
        .nav-links, .nav-cart, .nav-mobile-btn {
            color: #8B4513 !important;
            transition: color 0.3s ease;
        }
        .nav-link { transition: color 0.3s ease; }
        .nav-link:hover { color: #5c3a23 !important; }
        .nav-shop-btn {
            background-color: #8B4513 !important;
            color: #FFF1E0 !important;
            border: 1px solid #8B4513 !important;
            transition: all 0.3s ease;
        }
        .nav-shop-btn:hover {
            background-color: #5c3a23 !important;
            border-color: #5c3a23 !important;
        }
        
        /* Modal */
        #successModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="overflow-x-hidden pt-32">

    <!-- Navbar -->
    <nav class="fixed top-6 left-0 right-0 z-50 px-6" id="navbar">
        <div class="max-w-7xl w-full mx-auto flex justify-between items-center px-4 md:px-8 py-2 md:py-4 transition-all duration-500 glass-nav" id="nav-container">
            <a href="index.html" class="flex items-center gap-1 md:gap-3.5 shrink min-w-0">
                <img src="image/logo_icon.png" alt="Rudra Nethra Icon" class="h-6 md:h-10 w-auto object-contain shrink-0">
                <span class="w-[1px] h-6 md:h-8 bg-[#8B4513]/30 block"></span>
                <img src="image/logo_text.png" alt="Rudra Nethra Text" class="h-6 md:h-12 w-auto max-w-[110px] sm:max-w-none object-contain shrink min-w-0">
            </a>
            <div class="hidden md:flex items-center space-x-4 lg:space-x-8 font-medium text-xs lg:text-sm uppercase tracking-widest nav-links whitespace-nowrap">
                <a href="index.html" class="hover:text-[#5c3a23] nav-link">Home</a>
                <a href="product.html" class="hover:text-[#5c3a23] nav-link">Products</a>
                <a href="combo.html" class="hover:text-[#5c3a23] nav-link">Combo Offer</a>
                <a href="about.html" class="hover:text-[#5c3a23] nav-link">About</a>
                <a href="contact.html" class="hover:text-[#5c3a23] nav-link">Contact</a>
            </div>
            <div class="flex items-center space-x-1.5 md:space-x-6 shrink-0">
                 <!-- Simple modern cart icon -->
                 <a href="cart.html" class="nav-cart transition relative" aria-label="Cart">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 md:w-6 md:h-6">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
                    </svg>
                    <span id="navCartCount" class="absolute -top-1.5 -right-1.5 bg-[#8B4513] text-[#FFF1E0] text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
                 </a>
                <button onclick="window.location.href='product.html'" class="px-2 md:px-6 py-1.5 md:py-2 rounded-full text-[9px] md:text-sm nav-shop-btn transition font-medium whitespace-nowrap">Shop Now</button>
                 <!-- Mobile Menu Toggle Button -->
                 <button id="mobile-menu-btn" class="md:hidden nav-mobile-btn nav-link focus:outline-none transition-colors ml-2" aria-label="Open Menu">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                 </button>
            </div>
        </div>
    </nav>

    <!-- Main Content Wrapper -->
    <div class="relative z-20 bg-[#FFF1E0] mb-0 min-h-[70vh]">
        <main class="max-w-5xl mx-auto px-6 py-12">
            <h1 class="text-4xl mb-8 border-b border-[#8B4513]/20 pb-4">Secure Checkout</h1>

            <div class="flex flex-col md:flex-row gap-12">
                
                <!-- Left: Customer Details Form -->
                <div class="md:w-2/3">
                    <div class="bg-white/40 border border-[#8B4513]/20 p-8 rounded-xl shadow-sm">
                        <h2 class="text-2xl mb-6 font-semibold">Shipping Details</h2>
                        <form id="checkoutForm" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="input-label">Full Name *</label>
                                    <input type="text" id="custName" required class="input-field" placeholder="John Doe">
                                </div>
                                <div>
                                    <label class="input-label">Email Address *</label>
                                    <input type="email" id="custEmail" required class="input-field" placeholder="john@example.com">
                                </div>
                            </div>
                            
                            <div>
                                <label class="input-label">Phone Number *</label>
                                <input type="tel" id="custPhone" required class="input-field" placeholder="+91 9876543210">
                            </div>

                            <div>
                                <label class="input-label">Complete Address *</label>
                                <textarea id="custAddress" required class="input-field h-24 resize-none" placeholder="123 Sacred Space Ave, Apt 4B"></textarea>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div>
                                    <label class="input-label">City *</label>
                                    <input type="text" id="custCity" required class="input-field" placeholder="Chennai">
                                </div>
                                <div>
                                    <label class="input-label">State *</label>
                                    <input type="text" id="custState" required class="input-field" placeholder="Tamil Nadu">
                                </div>
                                <div>
                                    <label class="input-label">Pin Code *</label>
                                    <input type="text" id="custPin" required class="input-field" placeholder="600001">
                                </div>
                            </div>

                        </form>
                    </div>
                </div>

                <!-- Right: Order Summary -->
                <div class="md:w-1/3">
                    <div class="bg-white/40 border border-[#8B4513]/20 p-8 rounded-xl shadow-sm sticky top-32">
                        <h2 class="text-2xl mb-6 border-b border-[#8B4513]/20 pb-4">Your Order</h2>
                        
                        <div id="checkoutItemsList" class="space-y-4 mb-6 max-h-64 overflow-y-auto pr-2">
                            <!-- Items injected via JS -->
                        </div>

                        <div class="flex justify-between mb-4">
                            <span>Subtotal</span>
                            <span id="checkoutSubtotal" class="font-bold">₹0</span>
                        </div>
                        <div class="flex justify-between mb-6 text-sm text-[#8B4513]/60">
                            <span>Shipping</span>
                            <span class="text-green-600 font-bold">Free</span>
                        </div>
                        <div class="flex justify-between mb-8 text-xl border-t border-[#8B4513]/20 pt-4">
                            <span class="font-bold">Total to Pay</span>
                            <span id="checkoutTotal" class="font-bold text-2xl text-[#8B4513]">₹0</span>
                        </div>

                        <button id="placeOrderBtn" class="w-full py-4 bg-[#8B4513] text-[#FFF1E0] rounded-lg hover:bg-[#5c3a23] transition text-sm uppercase tracking-widest font-semibold shadow-lg">
                            Place Order Securely
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Success Modal -->
    <div id="successModal">
        <div class="bg-[#FFF1E0] p-10 rounded-2xl max-w-md w-full text-center border border-[#8B4513]/20 shadow-2xl transform transition-transform scale-95">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-3xl font-bold text-[#8B4513] mb-4 font-serif">Order Confirmed!</h3>
            <p class="text-[#8B4513]/80 mb-8">Thank you for your purchase. We have received your order securely. We will contact you soon with shipping details.</p>
            <button onclick="window.location.href='index.html'" class="px-8 py-3 bg-[#8B4513] text-[#FFF1E0] rounded-full font-bold hover:bg-[#5c3a23] transition-colors shadow-lg">
                Return to Home
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC8NPDb0efimxJE_WHA3-rbmFdynla6TwI",
            authDomain: "studio-6539281913-cab55.firebaseapp.com",
            projectId: "studio-6539281913-cab55",
            storageBucket: "studio-6539281913-cab55.firebasestorage.app",
            messagingSenderId: "654131616933",
            appId: "1:654131616933:web:1411cc691a6fe9a700c14c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Load Cart Items
        function loadCheckout() {
            let cart = JSON.parse(localStorage.getItem('rudraCart')) || [];
            if (cart.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            const list = document.getElementById('checkoutItemsList');
            let total = 0;
            let qty = 0;
            list.innerHTML = '';

            cart.forEach(item => {
                const q = item.quantity || 1;
                total += item.price * q;
                qty += q;
                list.innerHTML += `
                    <div class="flex items-center gap-4 text-sm">
                        <div class="relative">
                            <img src="${item.image || 'https://placehold.co/50x50/8B4513/FFF1E0?text=Item'}" class="w-16 h-16 object-cover rounded-md border border-[#8B4513]/20">
                            <span class="absolute -top-2 -right-2 bg-[#8B4513] text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">${q}</span>
                        </div>
                        <div class="flex-1">
                            <p class="font-bold text-[#8B4513]">${item.name}</p>
                        </div>
                        <div class="font-bold text-[#8B4513]">&#8377;${(item.price * q).toLocaleString('en-IN')}</div>
                    </div>
                `;
            });

            document.getElementById('checkoutSubtotal').innerText = '₹' + total.toLocaleString('en-IN');
            document.getElementById('checkoutTotal').innerText = '₹' + total.toLocaleString('en-IN');
            
            const navBadge = document.getElementById('navCartCount');
            if (navBadge) navBadge.innerText = qty;
        }

        window.addEventListener('load', loadCheckout);

        // Handle Order Placement
        document.getElementById('placeOrderBtn').addEventListener('click', async () => {
            const form = document.getElementById('checkoutForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const btn = document.getElementById('placeOrderBtn');
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing...`;
            btn.disabled = true;

            const customerData = {
                name: document.getElementById('custName').value,
                email: document.getElementById('custEmail').value,
                phone: document.getElementById('custPhone').value,
                address: document.getElementById('custAddress').value,
                city: document.getElementById('custCity').value,
                state: document.getElementById('custState').value,
                pin: document.getElementById('custPin').value,
            };

            const cart = JSON.parse(localStorage.getItem('rudraCart')) || [];
            let total = 0;
            cart.forEach(item => total += item.price * (item.quantity || 1));

            try {
                await addDoc(collection(db, "orders"), {
                    customer: customerData,
                    items: cart,
                    totalAmount: total,
                    status: 'Pending',
                    timestamp: serverTimestamp()
                });

                localStorage.removeItem('rudraCart');
                const modal = document.getElementById('successModal');
                modal.style.display = 'flex';
                setTimeout(() => modal.querySelector('div').classList.remove('scale-95'), 50);

            } catch (error) {
                console.error("Error placing order: ", error);
                alert("Something went wrong. Please try again later.");
                btn.innerHTML = "Place Order Securely";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
