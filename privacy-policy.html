<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - Rudra Nethra</title>
    <style>body { background-color: #0A0A0A; color: #FFF1E0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }        /* Gold Energy Glow & Shimmer */
        .gold-energy-glow {
            color: #FFE1A8;
            font-weight: 700;
            display: inline-block;
            position: relative;
            background: linear-gradient(
                120deg, 
                #FFE1A8 0%, 
                #FFF8E7 25%, 
                #FFE1A8 50%, 
                #D4A373 75%, 
                #FFE1A8 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gold-shimmer-glow 6s linear infinite;
            text-shadow: 0 0 15px rgba(255, 225, 168, 0.25);
        }
        @keyframes gold-shimmer-glow {
            0% {
                background-position: 0% center;
                filter: drop-shadow(0 0 2px rgba(255, 225, 168, 0.25));
            }
            50% {
                background-position: 100% center;
                filter: drop-shadow(0 0 8px rgba(255, 225, 168, 0.5));
            }
            100% {
                background-position: 200% center;
                filter: drop-shadow(0 0 2px rgba(255, 225, 168, 0.25));
            }
        }
    </style>
</head>
<body>
    <h1>Privacy Policy (Blank)</h1>
            <script id="active-footer-script">
        document.addEventListener("DOMContentLoaded", function() {
            const footerLinks = document.querySelectorAll("footer a");
            let currentPath = window.location.pathname.split("/").pop();
            if(!currentPath || currentPath === "") currentPath = "index.html";
            footerLinks.forEach(link => {
                const href = link.getAttribute("href");
                if(href && href.split("#")[0] === currentPath) {
                    link.style.color = "#8B4513";
                    link.style.fontWeight = "bold";
                    link.style.textShadow = "none";
                    link.classList.remove("text-[#FFF1E0]");
                    
                }
            });
        });
    </script>
</body>
</html>
